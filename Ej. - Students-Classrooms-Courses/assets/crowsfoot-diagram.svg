<svg xmlns="http://www.w3.org/2000/svg" width="900" height="500" viewBox="0 0 900 500">
  <rect width="900" height="500" fill="white"/>
  <style>
    text { font-family: Arial, sans-serif; font-size: 13px; fill: black; }
    .header { font-size: 14px; font-weight: bold; fill: white; }
    .pk { font-weight: bold; }
    .fk { font-style: italic; }
  </style>

  <!-- STUDENTS TABLE -->
  <rect x="40" y="120" width="200" height="30" fill="#333" stroke="black" stroke-width="2"/>
  <text x="140" y="140" text-anchor="middle" class="header">STUDENTS</text>
  <rect x="40" y="150" width="200" height="30" fill="white" stroke="black" stroke-width="1"/>
  <text x="55" y="170" class="pk">PK</text>
  <text x="100" y="170">id_student</text>
  <rect x="40" y="180" width="200" height="30" fill="white" stroke="black" stroke-width="1"/>
  <text x="100" y="200">name_student</text>
  <rect x="40" y="210" width="200" height="30" fill="white" stroke="black" stroke-width="1"/>
  <text x="55" y="230" class="fk">FK</text>
  <text x="100" y="230">classroom_id</text>

  <!-- CLASSROOMS TABLE -->
  <rect x="350" y="80" width="200" height="30" fill="#333" stroke="black" stroke-width="2"/>
  <text x="450" y="100" text-anchor="middle" class="header">CLASSROOMS</text>
  <rect x="350" y="110" width="200" height="30" fill="white" stroke="black" stroke-width="1"/>
  <text x="365" y="130" class="pk">PK</text>
  <text x="410" y="130">id</text>
  <rect x="350" y="140" width="200" height="30" fill="white" stroke="black" stroke-width="1"/>
  <text x="410" y="160">classroom</text>
  <rect x="350" y="170" width="200" height="30" fill="white" stroke="black" stroke-width="1"/>
  <text x="410" y="190">description</text>

  <!-- COURSES TABLE -->
  <rect x="350" y="300" width="200" height="30" fill="#333" stroke="black" stroke-width="2"/>
  <text x="450" y="320" text-anchor="middle" class="header">COURSES</text>
  <rect x="350" y="330" width="200" height="30" fill="white" stroke="black" stroke-width="1"/>
  <text x="365" y="350" class="pk">PK</text>
  <text x="410" y="350">id</text>
  <rect x="350" y="360" width="200" height="30" fill="white" stroke="black" stroke-width="1"/>
  <text x="410" y="380">name</text>
  <rect x="350" y="390" width="200" height="30" fill="white" stroke="black" stroke-width="1"/>
  <text x="365" y="410" class="fk">FK</text>
  <text x="410" y="410">classroom_id</text>

  <!-- STUDENTS → CLASSROOMS (N:1) -->
  <line x1="240" y1="225" x2="350" y2="125" stroke="black" stroke-width="2"/>
  <!-- Crow's foot on STUDENTS side (many) -->
  <line x1="240" y1="225" x2="256" y2="215" stroke="black" stroke-width="2"/>
  <line x1="240" y1="225" x2="256" y2="234" stroke="black" stroke-width="2"/>
  <line x1="253" y1="218" x2="253" y2="232" stroke="black" stroke-width="2"/>
  <!-- One line on CLASSROOMS side -->
  <line x1="344" y1="125" x2="356" y2="125" stroke="black" stroke-width="2"/>
  <line x1="350" y1="119" x2="350" y2="131" stroke="black" stroke-width="2"/>

  <!-- COURSES → CLASSROOMS (N:1) -->
  <line x1="350" y1="405" x2="350" y2="200" stroke="black" stroke-width="2"/>
  <!-- Crow's foot on COURSES side (many) -->
  <line x1="350" y1="405" x2="340" y2="390" stroke="black" stroke-width="2"/>
  <line x1="350" y1="405" x2="360" y2="390" stroke="black" stroke-width="2"/>
  <line x1="341" y1="393" x2="359" y2="393" stroke="black" stroke-width="2"/>
  <!-- One line on CLASSROOMS side -->
  <line x1="344" y1="200" x2="356" y2="200" stroke="black" stroke-width="2"/>
  <line x1="344" y1="194" x2="356" y2="194" stroke="black" stroke-width="2"/>

  <!-- Labels -->
  <text x="278" y="172" text-anchor="middle" font-size="11" fill="#666">belongs to</text>
  <text x="318" y="312" text-anchor="middle" font-size="11" fill="#666">assigned to</text>

</svg>
